name: Terraform Multi Environment Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment to deploy"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

permissions:
  contents: read

jobs:
  terraform-plan-apply:
    name: Terraform Plan and Apply - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: environments/opella

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Set Terraform environment mapping
        run: |
          if [ "${{ github.event.inputs.environment }}" = "development" ]; then
            echo "TF_ENV=dev" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "TF_ENV=prod" >> $GITHUB_ENV
          else
            echo "Invalid environment selected"
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false -backend-config="backend-${{ env.TF_ENV }}.hcl"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="${{ env.TF_ENV }}.tfvars.example" \
            -out="${{ env.TF_ENV }}.tfplan"

      - name: Save Terraform Plan Output
        run: |
          terraform show -no-color "${{ env.TF_ENV }}.tfplan" > "${{ env.TF_ENV }}-terraform-plan-output.txt"

      - name: Upload Terraform Plan Output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TF_ENV }}-terraform-plan-output
          path: environments/opella/${{ env.TF_ENV }}-terraform-plan-output.txt

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve "${{ env.TF_ENV }}.tfplan"